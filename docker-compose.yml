services:
  dailyhot-api:
    image: imsyy/dailyhot-api:latest
    ports:
      - "6688:6688"
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8900:8900"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-deepseek/deepseek-v4-pro}
      - DAILYHOT_API_URL=http://dailyhot-api:6688
    depends_on:
      - dailyhot-api
    restart: unless-stopped
